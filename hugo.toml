baseURL = 'https://216612.xyz/'
locale = 'zh-cn'
title = '216612'
theme = 'PaperMod'

enableRobotsTXT = true

[params]
  env = 'production'
  description = '个人技术博客'
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  comments = true

  [params.assets]
    favicon = '/favicon.ico'
    favicon16x16 = '/favicon.png'
    favicon32x32 = '/favicon.png'
    apple_touch_icon = '/favicon.png'
    safari_pinned_tab = '/favicon.png'

  [params.homeInfoParams]
    Title = 'Hi there 👋'
    Content = '欢迎来到我的技术博客'

  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/apexdocker'

[menu]
  [[menu.main]]
    identifier = 'archives'
    name = '归档'
    url = '/archives/'
    weight = 10
  [[menu.main]]
    identifier = 'tags'
    name = '标签'
    url = '/tags/'
    weight = 20
  [[menu.main]]
    identifier = 'search'
    name = '搜索'
    url = '/search/'
    weight = 30
  [[menu.main]]
    identifier = 'about'
    name = '关于'
    url = '/about/'
    weight = 40

[outputs]
  home = ['HTML', 'RSS', 'JSON']
